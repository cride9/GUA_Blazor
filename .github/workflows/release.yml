name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            zip_name: GUA_Blazor-windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            zip_name: GUA_Blazor-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish GUA_Blazor.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish

      - name: Copy Kokoro submodule
        shell: bash
        run: |
          mkdir -p ./publish/Kokoro
          cp -r ./Kokoro/. ./publish/Kokoro/

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.zip_name }}.zip

      - name: Zip (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip -r ./${{ matrix.zip_name }}.zip ./publish/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ matrix.zip_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
